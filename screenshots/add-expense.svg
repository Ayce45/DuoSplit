<svg xmlns="http://www.w3.org/2000/svg" width="360" height="640" viewBox="0 0 360 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0e"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c6bf0"/>
      <stop offset="100%" stop-color="#b0a4ff"/>
    </linearGradient>
  </defs>
  <rect width="360" height="640" fill="url(#bg)" rx="20"/>
  <!-- Status bar -->
  <rect x="0" y="0" width="360" height="44" fill="rgba(0,0,0,0.3)" rx="20"/>
  <text x="180" y="30" fill="#ebebf0" font-family="sans-serif" font-size="13" text-anchor="middle">9:41</text>
  <!-- Header -->
  <text x="50" y="80" fill="#ebebf0" font-family="sans-serif" font-size="20" font-weight="bold">Nouvelle dépense</text>
  <text x="20" y="80" fill="#7c6bf0" font-family="sans-serif" font-size="20">←</text>
  <!-- Card -->
  <rect x="20" y="100" width="320" height="430" fill="#141419" rx="16" stroke="#262632" stroke-width="1"/>
  <!-- Label -->
  <text x="40" y="135" fill="#8585a0" font-family="sans-serif" font-size="12">Libellé</text>
  <rect x="40" y="145" width="280" height="44" fill="#0a0a0e" rx="10" stroke="#262632" stroke-width="1"/>
  <text x="56" y="172" fill="#ebebf0" font-family="sans-serif" font-size="15">Courses Carrefour</text>
  <!-- Amount -->
  <text x="40" y="215" fill="#8585a0" font-family="sans-serif" font-size="12">Montant</text>
  <rect x="40" y="225" width="280" height="44" fill="#0a0a0e" rx="10" stroke="#262632" stroke-width="1"/>
  <text x="56" y="252" fill="#ebebf0" font-family="sans-serif" font-size="15">45,00 €</text>
  <!-- Date -->
  <text x="40" y="295" fill="#8585a0" font-family="sans-serif" font-size="12">Date</text>
  <rect x="40" y="305" width="280" height="44" fill="#0a0a0e" rx="10" stroke="#262632" stroke-width="1"/>
  <text x="56" y="332" fill="#ebebf0" font-family="sans-serif" font-size="15">03/03/2026</text>
  <!-- Payer -->
  <text x="40" y="380" fill="#8585a0" font-family="sans-serif" font-size="12">Payé par</text>
  <rect x="40" y="390" width="135" height="40" fill="#7c6bf0" rx="10"/>
  <text x="107" y="415" fill="white" font-family="sans-serif" font-size="14" text-anchor="middle" font-weight="600">Alice</text>
  <rect x="185" y="390" width="135" height="40" fill="#0a0a0e" rx="10" stroke="#262632" stroke-width="1"/>
  <text x="252" y="415" fill="#8585a0" font-family="sans-serif" font-size="14" text-anchor="middle">Bob</text>
  <!-- Split preview -->
  <rect x="40" y="450" width="280" height="60" fill="rgba(124,107,240,0.08)" rx="10"/>
  <text x="180" y="475" fill="#b0a4ff" font-family="sans-serif" font-size="13" text-anchor="middle">Alice paie 45,00 €</text>
  <text x="180" y="497" fill="#8585a0" font-family="sans-serif" font-size="12" text-anchor="middle">Bob doit 22,50 € à Alice</text>
  <!-- Save button -->
  <rect x="20" y="555" width="320" height="48" fill="url(#accent)" rx="12"/>
  <text x="180" y="585" fill="white" font-family="sans-serif" font-size="16" text-anchor="middle" font-weight="bold">Enregistrer</text>
</svg>
