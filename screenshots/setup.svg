<svg xmlns="http://www.w3.org/2000/svg" width="360" height="640" viewBox="0 0 360 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0e"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c6bf0"/>
      <stop offset="100%" stop-color="#b0a4ff"/>
    </linearGradient>
  </defs>
  <rect width="360" height="640" fill="url(#bg)" rx="20"/>
  <!-- Status bar -->
  <rect x="0" y="0" width="360" height="44" fill="rgba(0,0,0,0.3)" rx="20"/>
  <text x="180" y="30" fill="#ebebf0" font-family="sans-serif" font-size="13" text-anchor="middle">9:41</text>
  <!-- Icon -->
  <circle cx="180" cy="130" r="40" fill="url(#accent)" opacity="0.15"/>
  <text x="180" y="145" fill="#7c6bf0" font-family="sans-serif" font-size="36" text-anchor="middle" font-weight="bold">÷</text>
  <!-- Title -->
  <text x="180" y="200" fill="#ebebf0" font-family="sans-serif" font-size="28" text-anchor="middle" font-weight="bold">DuoSplit</text>
  <text x="180" y="225" fill="#8585a0" font-family="sans-serif" font-size="13" text-anchor="middle">Configurez votre partage</text>
  <!-- Card -->
  <rect x="20" y="255" width="320" height="300" fill="#141419" rx="16" stroke="#262632" stroke-width="1"/>
  <!-- Name 1 -->
  <text x="40" y="290" fill="#8585a0" font-family="sans-serif" font-size="12">Personne 1</text>
  <rect x="40" y="300" width="280" height="44" fill="#0a0a0e" rx="10" stroke="#262632" stroke-width="1"/>
  <text x="56" y="327" fill="#ebebf0" font-family="sans-serif" font-size="15">Alice</text>
  <!-- Name 2 -->
  <text x="40" y="370" fill="#8585a0" font-family="sans-serif" font-size="12">Personne 2</text>
  <rect x="40" y="380" width="280" height="44" fill="#0a0a0e" rx="10" stroke="#262632" stroke-width="1"/>
  <text x="56" y="407" fill="#ebebf0" font-family="sans-serif" font-size="15">Bob</text>
  <!-- Ratio -->
  <text x="40" y="455" fill="#8585a0" font-family="sans-serif" font-size="12">Répartition</text>
  <rect x="40" y="465" width="280" height="6" fill="#262632" rx="3"/>
  <rect x="40" y="465" width="140" height="6" fill="url(#accent)" rx="3"/>
  <text x="180" y="490" fill="#b0a4ff" font-family="sans-serif" font-size="13" text-anchor="middle">50% / 50%</text>
  <!-- Who am I -->
  <text x="40" y="525" fill="#8585a0" font-family="sans-serif" font-size="12">Je suis...</text>
  <rect x="40" y="535" width="135" height="36" fill="#7c6bf0" rx="8"/>
  <text x="107" y="558" fill="white" font-family="sans-serif" font-size="14" text-anchor="middle">Alice</text>
  <rect x="185" y="535" width="135" height="36" fill="#0a0a0e" rx="8" stroke="#262632" stroke-width="1"/>
  <text x="252" y="558" fill="#8585a0" font-family="sans-serif" font-size="14" text-anchor="middle">Bob</text>
  <!-- Start button -->
  <rect x="20" y="580" width="320" height="48" fill="url(#accent)" rx="12"/>
  <text x="180" y="610" fill="white" font-family="sans-serif" font-size="16" text-anchor="middle" font-weight="bold">C'est parti !</text>
</svg>
