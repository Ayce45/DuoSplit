<svg xmlns="http://www.w3.org/2000/svg" width="360" height="640" viewBox="0 0 360 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0e"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c6bf0"/>
      <stop offset="100%" stop-color="#b0a4ff"/>
    </linearGradient>
  </defs>
  <rect width="360" height="640" fill="url(#bg)" rx="20"/>
  <!-- Status bar -->
  <rect x="0" y="0" width="360" height="44" fill="rgba(0,0,0,0.3)" rx="20"/>
  <text x="180" y="30" fill="#ebebf0" font-family="sans-serif" font-size="13" text-anchor="middle">9:41</text>
  <!-- Header -->
  <text x="50" y="80" fill="#ebebf0" font-family="sans-serif" font-size="20" font-weight="bold">Synchroniser</text>
  <text x="20" y="80" fill="#7c6bf0" font-family="sans-serif" font-size="20">←</text>
  <!-- QR Code option -->
  <rect x="20" y="110" width="320" height="80" fill="#141419" rx="16" stroke="#262632" stroke-width="1"/>
  <rect x="40" y="130" width="40" height="40" fill="rgba(124,107,240,0.13)" rx="10"/>
  <text x="60" y="157" fill="#7c6bf0" font-family="sans-serif" font-size="22" text-anchor="middle">⬚</text>
  <text x="100" y="148" fill="#ebebf0" font-family="sans-serif" font-size="15" font-weight="600">Afficher mon QR code</text>
  <text x="100" y="168" fill="#8585a0" font-family="sans-serif" font-size="12">L'autre personne scanne ton code</text>
  <!-- Scan option -->
  <rect x="20" y="200" width="320" height="80" fill="#141419" rx="16" stroke="#262632" stroke-width="1"/>
  <rect x="40" y="220" width="40" height="40" fill="rgba(124,107,240,0.13)" rx="10"/>
  <text x="60" y="247" fill="#7c6bf0" font-family="sans-serif" font-size="22" text-anchor="middle">📷</text>
  <text x="100" y="238" fill="#ebebf0" font-family="sans-serif" font-size="15" font-weight="600">Scanner un QR code</text>
  <text x="100" y="258" fill="#8585a0" font-family="sans-serif" font-size="12">Scanne le code de l'autre personne</text>
  <!-- Share link option -->
  <rect x="20" y="290" width="320" height="80" fill="#141419" rx="16" stroke="#262632" stroke-width="1"/>
  <rect x="40" y="310" width="40" height="40" fill="rgba(124,107,240,0.13)" rx="10"/>
  <text x="60" y="337" fill="#7c6bf0" font-family="sans-serif" font-size="22" text-anchor="middle">🔗</text>
  <text x="100" y="328" fill="#ebebf0" font-family="sans-serif" font-size="15" font-weight="600">Partager un lien</text>
  <text x="100" y="348" fill="#8585a0" font-family="sans-serif" font-size="12">Envoie par SMS, WhatsApp, email...</text>
  <!-- QR Preview -->
  <rect x="20" y="400" width="320" height="220" fill="#141419" rx="16" stroke="#262632" stroke-width="1"/>
  <text x="180" y="430" fill="#8585a0" font-family="sans-serif" font-size="12" text-anchor="middle">Aperçu QR code</text>
  <!-- Fake QR -->
  <rect x="115" y="445" width="130" height="130" fill="white" rx="8"/>
  <g fill="#0a0a0e">
    <!-- QR pattern approximation -->
    <rect x="125" y="455" width="30" height="30" rx="2"/>
    <rect x="205" y="455" width="30" height="30" rx="2"/>
    <rect x="125" y="535" width="30" height="30" rx="2"/>
    <rect x="165" y="475" width="10" height="10"/>
    <rect x="180" y="475" width="10" height="10"/>
    <rect x="195" y="495" width="10" height="10"/>
    <rect x="165" y="505" width="10" height="10"/>
    <rect x="180" y="515" width="10" height="10"/>
    <rect x="195" y="525" width="10" height="10"/>
    <rect x="170" y="540" width="10" height="10"/>
    <rect x="200" y="540" width="10" height="10"/>
    <rect x="215" y="505" width="10" height="10"/>
  </g>
  <text x="180" y="598" fill="#b0a4ff" font-family="sans-serif" font-size="11" text-anchor="middle">5 dépenses · 2 règlements</text>
</svg>
