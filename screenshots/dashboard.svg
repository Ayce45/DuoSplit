<svg xmlns="http://www.w3.org/2000/svg" width="360" height="640" viewBox="0 0 360 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0e"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c6bf0"/>
      <stop offset="100%" stop-color="#b0a4ff"/>
    </linearGradient>
  </defs>
  <rect width="360" height="640" fill="url(#bg)" rx="20"/>
  <!-- Status bar -->
  <rect x="0" y="0" width="360" height="44" fill="rgba(0,0,0,0.3)" rx="20"/>
  <text x="180" y="30" fill="#ebebf0" font-family="sans-serif" font-size="13" text-anchor="middle">9:41</text>
  <!-- Header -->
  <text x="20" y="80" fill="#ebebf0" font-family="sans-serif" font-size="22" font-weight="bold">DuoSplit</text>
  <text x="20" y="100" fill="#8585a0" font-family="sans-serif" font-size="13">Alice &amp; Bob · 50/50</text>
  <!-- Sync icon -->
  <circle cx="310" cy="82" r="18" fill="#141419" stroke="#262632" stroke-width="1"/>
  <text x="310" y="88" fill="#7c6bf0" font-family="sans-serif" font-size="16" text-anchor="middle">↗</text>
  <!-- Settings icon -->
  <circle cx="340" cy="82" r="18" fill="#141419" stroke="#262632" stroke-width="1"/>
  <text x="340" y="88" fill="#8585a0" font-family="sans-serif" font-size="14" text-anchor="middle">⚙</text>
  <!-- Balance Card -->
  <rect x="20" y="120" width="320" height="100" fill="#141419" rx="16" stroke="#262632" stroke-width="1"/>
  <text x="40" y="150" fill="#8585a0" font-family="sans-serif" font-size="12">Solde actuel</text>
  <text x="40" y="180" fill="#2dd4a0" font-family="sans-serif" font-size="24" font-weight="bold">Bob te doit 12,50 €</text>
  <rect x="40" y="195" width="120" height="14" fill="rgba(45,212,160,0.15)" rx="7"/>
  <text x="100" y="205" fill="#2dd4a0" font-family="sans-serif" font-size="10" text-anchor="middle">Solder</text>
  <!-- Stats row -->
  <rect x="20" y="235" width="100" height="60" fill="#141419" rx="12" stroke="#262632" stroke-width="1"/>
  <text x="70" y="260" fill="#7c6bf0" font-family="sans-serif" font-size="18" text-anchor="middle" font-weight="bold">5</text>
  <text x="70" y="280" fill="#8585a0" font-family="sans-serif" font-size="11" text-anchor="middle">dépenses</text>
  <rect x="130" y="235" width="100" height="60" fill="#141419" rx="12" stroke="#262632" stroke-width="1"/>
  <text x="180" y="260" fill="#7c6bf0" font-family="sans-serif" font-size="18" text-anchor="middle" font-weight="bold">87,00 €</text>
  <text x="180" y="280" fill="#8585a0" font-family="sans-serif" font-size="11" text-anchor="middle">total</text>
  <rect x="240" y="235" width="100" height="60" fill="#141419" rx="12" stroke="#262632" stroke-width="1"/>
  <text x="290" y="260" fill="#7c6bf0" font-family="sans-serif" font-size="18" text-anchor="middle" font-weight="bold">2</text>
  <text x="290" y="280" fill="#8585a0" font-family="sans-serif" font-size="11" text-anchor="middle">soldés</text>
  <!-- Expense list -->
  <text x="20" y="325" fill="#8585a0" font-family="sans-serif" font-size="12">Dépenses</text>
  <!-- Expense 1 -->
  <rect x="20" y="340" width="320" height="64" fill="#141419" rx="12" stroke="#262632" stroke-width="1"/>
  <text x="40" y="365" fill="#ebebf0" font-family="sans-serif" font-size="15" font-weight="600">Courses Carrefour</text>
  <text x="40" y="385" fill="#8585a0" font-family="sans-serif" font-size="12">Alice · 03/03/2026</text>
  <text x="320" y="365" fill="#ebebf0" font-family="sans-serif" font-size="16" text-anchor="end" font-weight="bold">45,00 €</text>
  <!-- Expense 2 -->
  <rect x="20" y="414" width="320" height="64" fill="#141419" rx="12" stroke="#262632" stroke-width="1"/>
  <text x="40" y="439" fill="#ebebf0" font-family="sans-serif" font-size="15" font-weight="600">Restaurant</text>
  <text x="40" y="459" fill="#8585a0" font-family="sans-serif" font-size="12">Bob · 02/03/2026</text>
  <text x="320" y="439" fill="#ebebf0" font-family="sans-serif" font-size="16" text-anchor="end" font-weight="bold">32,00 €</text>
  <!-- Expense 3 -->
  <rect x="20" y="488" width="320" height="64" fill="#141419" rx="12" stroke="#262632" stroke-width="1"/>
  <text x="40" y="513" fill="#ebebf0" font-family="sans-serif" font-size="15" font-weight="600">Essence</text>
  <text x="40" y="533" fill="#8585a0" font-family="sans-serif" font-size="12">Alice · 01/03/2026</text>
  <text x="320" y="513" fill="#ebebf0" font-family="sans-serif" font-size="16" text-anchor="end" font-weight="bold">10,00 €</text>
  <!-- FAB -->
  <circle cx="320" cy="600" r="28" fill="#7c6bf0"/>
  <text x="320" y="608" fill="white" font-family="sans-serif" font-size="28" text-anchor="middle">+</text>
</svg>
